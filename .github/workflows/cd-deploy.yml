name: CD — Deploy to AWS

on:
  push:
    branches: ["main"]
    paths:
      - "Directory.Build.props"
      - "Directory.Packages.props"
      - "backend/**"
      - "frontend/**"
      - "infra/**"
      - "functions/**"
      - ".github/workflows/cd-deploy.yml"
      - ".github/workflows/cd-infra.yml"
      - ".github/workflows/cd-frontend.yml"
      - ".github/workflows/cd-lambda.yml"
  workflow_dispatch:

permissions:
  id-token: write   # Required by all child workflows for OIDC → AWS
  contents: read

concurrency:
  group: cd-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  # ── 1. Infrastructure ──────────────────────────────────────────
  infra:
    uses: ./.github/workflows/cd-infra.yml
    with:
      aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
    secrets:
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  # ── 2. Frontend (runs in parallel with lambda) ─────────────────
  frontend:
    uses: ./.github/workflows/cd-frontend.yml
    with:
      aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
    secrets:
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

  # ── 3. Lambda functions (needs infra outputs) ──────────────────
  lambda:
    needs: infra
    uses: ./.github/workflows/cd-lambda.yml
    with:
      aws-region:                ${{ vars.AWS_REGION || 'us-east-1' }}
      lambda-function-name:      ${{ needs.infra.outputs.lambda-function-name }}
      reminder-lambda-name:      ${{ needs.infra.outputs.reminder-lambda-name }}
      notifications-lambda-name: ${{ needs.infra.outputs.notifications-lambda-name }}
    secrets:
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}


