name: CI — Frontend
  
on:
  pull_request:
    branches: ["main"]
    paths: ["frontend"]
  push:
    branches: ["main"]
    paths: ["frontend"]
 
jobs:
  frontend:
    runs-on: ubuntu-latest    
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
 
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - uses: actions/cache@v4
        name: Configure Bun caching
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun ci
 
      - name: Check formatting and linting 
        run: bun run check

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build