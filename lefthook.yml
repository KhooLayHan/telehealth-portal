pre-commit:
  parallel: true
  commands:
    frontend-check:
      glob: "frontend/**/*.{js,ts,jsx,tsx,json,jsonc,css}"
      run: bun run --cwd frontend check {staged_files}
    frontend-fix:
      glob: "frontend/**/*.{js,ts,jsx,tsx,json,jsonc,css}"
      run: bun run --cwd frontend fix {staged_files}
      stage_fixed: true
    backend-format:
      glob: "backend/**/*.cs"
      run: dotnet csharpier check backend/
    root-check:
      glob: "*.{json,jsonc}"
      run: bun x ultracite check {staged_files}
    root-fix:
      glob: "*.{json,jsonc}"
      run: bun x ultracite fix {staged_files}
      stage_fixed: true
  jobs:
    - name: "Frontend Check"
      glob: "frontend/**/*.{js,ts,jsx,tsx,json,jsonc,css}"
      run: bun run --cwd frontend check {staged_files}
    - name: "Frontend Fix"
      glob: "frontend/**/*.{js,ts,jsx,tsx,json,jsonc,css}"
      run: bun run --cwd frontend fix {staged_files}
      stage_fixed: true
    - name: "Backend Format"
      glob: "backend/**/*.cs"
      run: dotnet csharpier check backend/

pre-push:
  parallel: true
  commands:
    frontend-test:
      run: bun run --cwd frontend test
      glob: "frontend/**/*.{ts,tsx}"
    backend-test:
      run: bun run --cwd backend test
  jobs:
    - name: "Frontend Tests"
      run: bun run --cwd frontend test
      glob: "frontend/**/*.{ts,tsx}"
    - name: "Backend Tests"
      run: bun run --cwd backend test
      glob: "backend/**/*.cs"
