pre-commit:
  parallel: true
  
  commands:
    check:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc,css}"
      run: bunx ultracite check {staged_files}
  
    fix:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc,css}"
      run: bunx ultracite fix {staged_files}
      stage_fixed: true

  jobs:
    - name: "check"
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc,css}"
      run: bunx ultracite check {staged_files}
    
    - name: "fix"
      run: bunx ultracite fix
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc,css}"
      stage_fixed: true

pre-push:
  parallel: true

  jobs:
    - name: "check"
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc,css}"
      run: bunx ultracite check {staged_files}

