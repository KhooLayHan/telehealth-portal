name: CD — Infrastructure (Pulumi)

on:
  workflow_call:
    inputs:
      aws-region:
        required: true
        type: string
    secrets:
      AWS_DEPLOY_ROLE_ARN:
        required: true
      PULUMI_ACCESS_TOKEN:
        required: true
    outputs:
      frontend-bucket:
        value: ${{ jobs.deploy-infra.outputs.frontend-bucket }}
      artifacts-bucket:
        value: ${{ jobs.deploy-infra.outputs.artifacts-bucket }}
      lambda-function-name:
        value: ${{ jobs.deploy-infra.outputs.lambda-function-name }}
      reminder-lambda-name:
        value: ${{ jobs.deploy-infra.outputs.reminder-lambda-name }}
      notifications-lambda-name:
        value: ${{ jobs.deploy-infra.outputs.notifications-lambda-name }}
      admin-analytics-lambda-name:
        value: ${{ jobs.deploy-infra.outputs.admin-analytics-lambda-name }}
      admin-analytics-api-endpoint:
        value: ${{ jobs.deploy-infra.outputs.admin-analytics-api-endpoint }}

jobs:
  deploy-infra:
    name: Pulumi — Provision Infrastructure
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      frontend-bucket:           ${{ steps.pulumi.outputs.FrontendBucketName }}
      artifacts-bucket:          ${{ steps.pulumi.outputs.S3ArtifactsBucket }}
      lambda-function-name:      ${{ steps.pulumi.outputs.LambdaFunctionName }}
      reminder-lambda-name:      ${{ steps.pulumi.outputs.ReminderLambdaName }}
      notifications-lambda-name: ${{ steps.pulumi.outputs.NotificationsLambdaName }}
      admin-analytics-lambda-name: ${{ steps.pulumi.outputs.AdminAnalyticsLambdaName }}
      admin-analytics-api-endpoint: ${{ steps.pulumi.outputs.AdminAnalyticsApiEndpoint }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Setup .NET (required by Pulumi C# program)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Pulumi up
        uses: pulumi/actions@v6
        id: pulumi
        with:
          command: up
          stack-name: prod
          work-dir: infra
          upsert: true
          refresh: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
