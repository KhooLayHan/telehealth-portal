name: CD - Lambda Functions

on:
  workflow_call:
    inputs:
      aws-region:
        required: true
        type: string
      lambda-function-name:
        required: true
        type: string
      reminder-lambda-name:
        required: true
        type: string
      notifications-lambda-name:
        required: true
        type: string
      admin-analytics-lambda-name:
        required: true
        type: string
    secrets:
      AWS_DEPLOY_ROLE_ARN:
        required: true

jobs:
  deploy-lambda:
    name: Lambda - Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ inputs.aws-region }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish lab-pdf-processor Lambda
        working-directory: functions/lab-pdf-processor/src/LabPdfProcessor-dev-ProcessPdfDocument
        run: |
          dotnet publish -c Release -r linux-x64 --self-contained true -o ./publish
          cd publish
          zip -r ../../../function.zip *

      - name: Deploy lab-pdf-processor to AWS Lambda
        env:
          LAMBDA_NAME: ${{ inputs.lambda-function-name }}
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_NAME" \
            --zip-file fileb://functions/lab-pdf-processor/function.zip

          echo "Lab PDF processor Lambda deployment complete."

      - name: Publish appointment-reminder Lambda
        working-directory: functions/appointment-reminder/src/AppointmentReminder-dev-SentReminder
        run: |
          dotnet publish -c Release -r linux-x64 --self-contained true -o ./publish
          cd publish
          zip -r ../../../function.zip *

      - name: Deploy appointment-reminder to AWS Lambda
        env:
          LAMBDA_NAME: ${{ inputs.reminder-lambda-name }}
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_NAME" \
            --zip-file fileb://functions/appointment-reminder/function.zip

          echo "Appointment reminder Lambda deployment complete."

      - name: Publish appointment-notifications Lambda
        working-directory: functions/appointment-notifications/src/AppointmentNotifications
        run: |
          dotnet publish -c Release -r linux-x64 --self-contained true -o ./publish
          cd publish
          zip -r ../../../function.zip *

      - name: Deploy appointment-notifications to AWS Lambda
        env:
          LAMBDA_NAME: ${{ inputs.notifications-lambda-name }}
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_NAME" \
            --zip-file fileb://functions/appointment-notifications/function.zip

          echo "Appointment notifications Lambda deployment complete."

      - name: Publish admin-analytics Lambda
        working-directory: functions/admin-analytics/src/AdminAnalytics
        run: |
          dotnet publish -c Release -r linux-x64 --self-contained true -o ./publish
          cd publish
          zip -r ../../../function.zip *

      - name: Deploy admin-analytics to AWS Lambda
        env:
          LAMBDA_NAME: ${{ inputs.admin-analytics-lambda-name }}
        run: |
          aws lambda update-function-code \
            --function-name "$LAMBDA_NAME" \
            --zip-file fileb://functions/admin-analytics/function.zip

          echo "Admin analytics Lambda deployment complete."
